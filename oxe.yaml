$engine: 3
$onesync: on
name: OXE Base
version: 1.0.0
author: Njoy
description: >
  Only includes the base including qbx_core and any free releases will still
  require you to insert your [OxePack] folder from keymaster.

tasks:
  # DOWNLOAD BASE FILES FROM TXADMINRECIPE
  - action: download_github
    src: https://github.com/beastdummy/txadmin-recipe-oxe.git
    ref: main
    dest: ./tmp/oxe

  # MAIN SERVER CONFIG
  - action: move_path
    src: ./tmp/oxe/server.cfg
    dest: ./server.cfg

  # SERVER CONFIGS
  - action: move_path
    src: ./tmp/oxe/server_configs
    dest: ./server_configs

  # BASE Oxe LOGO  
  - action: move_path 
    src: ./tmp/oxe/myLogo.png
    dest: ./myLogo.png
    overwrite: true

  # ENSURE RESOURCE FOLDER  
  - action: ensure_dir
    path: ./resources
    
  # ENSURE SUB RESOURCE FOLDERS
  # [CFX-DEFAULT] 
  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    subpath: resources
    dest: ./resources/[cfx-default]   
  # [STANDALONE] 
  - action: ensure_dir
    path: ./resources/[standalone] 

  # ox_lib
  - action: download_file
    path: ./tmp/ox_lib.zip
    url: https://github.com/CommunityOx/ox_lib/releases/download/v3.32.3/ox_lib.zip
  - action: unzip
    dest: ./resources/[standalone]
    src: ./tmp/ox_lib.zip

  # bob74_ipl 
  - action: download_github
    src: https://github.com/Bob74/bob74_ipl
    ref: master 
    dest: ./resources/[standalone]/bob74_ipl

  # screenshot-basic 
  - action: download_file
    path: ./tmp/screenshot-basic.zip
    url: https://github.com/project-error/screenshot-basic/releases/latest/download/screenshot-basic.zip
  - action: unzip
    dest: ./resources/[standalone]/screenshot-basic
    src: ./tmp/screenshot-basic.zip

  # xsound 
  - action: download_github
    src: https://github.com/Xogy/xsound
    ref: master 
    dest: ./resources/[standalone]/xsound

  # pma-voice  
  - action: download_github
    dest: ./resources/[standalone]/pma-voice
    ref: main
    src: https://github.com/AWZ-Code/pma-voice/archive/refs/heads/main.zip

  # ox_target | Oxe VERSION
  - action: download_file
    path: ./tmp/ox_target.zip
    url: https://github.com/CommunityOx/ox_target/releases/download/v1.18.0/ox_target.zip
  - action: unzip
    dest: ./resources/[standalone]
    src: ./tmp/ox_target.zip

  # sleepless_interact | Oxe VERSION
  - action: download_file
    path: ./tmp/sleepless_interact.zip
    url: https://github.com/Sleepless-Development/sleepless_interact/releases/download/v2.1.3/sleepless_interact.zip
  - action: unzip
    dest: ./resources/[standalone]
    src: ./tmp/sleepless_interact.zip

  # Oxe_chat
  - action: download_file
    path: ./tmp/bm_rpchat-main.zip
    url: https://github.com/Garn123/bm_rpchat/archive/refs/heads/main.zip
  - action: unzip
    dest: ./resources/[standalone]
    src: ./tmp/bm_rpchat-main.zip

  # oxmysql
  - action: download_file
    path: ./tmp/oxmysql.zip
    url: https://github.com/CommunityOx/oxmysql/releases/download/v2.12.3/oxmysql.zip
  - action: unzip
    dest: ./resources/[standalone]
    src: ./tmp/oxmysql.zip


  # [Oxe] 
  - action: ensure_dir 
    path: ./resources/[oxe]

  # [Oxe/ACTIVITIES] 
  - action: ensure_dir 
    path: ./resources/[oxe]/[activities]

  # [Oxe/CORE] 
  - action: ensure_dir 
    path: ./resources/[oxe]/[core]

  # oxe_lib — capa central OXE (ox_lib + oxmysql + bridges). Requiere esta carpeta junto a txAdminRecipe-main: ../oxe_lib
  # Para despliegue solo con zip, sustituye por download_github / download_file + unzip hacia ./resources/[oxe]/[core]
  - action: move_path
    src: ../oxe_lib
    dest: ./resources/[oxe]/[core]/oxe_lib
    overwrite: true

  # qbx_core | Oxe VERSION
  - action: download_github
    dest: ./resources/[oxe]/[core]/qbx_core
    ref: main
    src: https://github.com/Qbox-project/qbx_core/releases/download/v1.23.0/qbx_core.zip

  # [Oxe/CRIMINAL] 
  - action: ensure_dir 
    path: ./resources/[oxe]/[criminal]

  # [Oxe/GOVERNMENT] 
  - action: ensure_dir 
    path: ./resources/[oxe]/[government]

  # [Oxe/JOBS] 
  - action: ensure_dir 
    path: ./resources/[oxe]/[jobs]

  # [Oxe/UI] 
  - action: ensure_dir 
    path: ./resources/[oxe]/[ui]

  # [Oxe/UTILITIES] 
  - action: ensure_dir 
    path: ./resources/[oxe]/[utilities]

  # [Oxe/VEHICLE] 
  - action: ensure_dir 
    path: ./resources/[oxe]/[vehicle]

  # [CREATORS] 
  - action: ensure_dir 
    path: ./resources/[creators]
    
  # [STREAM] 
  - action: ensure_dir 
    path: ./resources/[stream] 
  - action: ensure_dir 
    path: ./resources/[stream]/[maps]
  - action: ensure_dir 
    path: ./resources/[stream]/[vehicles]
  - action: ensure_dir 
    path: ./resources/[stream]/[shells]
  - action: ensure_dir 
    path: ./resources/[stream]/[clothing]
  - action: ensure_dir 
    path: ./resources/[stream]/[props]

 
  # SQL STUFF 
  - action: connect_database
  - action: query_database
    file: ./tmp/oxe/oxe.sql
   
  # Oxe UP
  - action: remove_path
    path: ./tmp
